  <rect x="30" y="722" width="1040" height="80" rx="8" fill="#0d1117" stroke="#1e2d3e" stroke-width="1"/>
  <text x="550" y="743" text-anchor="middle" fill="#90a4ae" font-size="10" font-weight="600" letter-spacing="2">DEVELOPER WORKFLOW</text>

  <!-- Step 1 -->
  <circle cx="90" cy="768" r="14" fill="#1e88e5"/>
  <text x="90" y="773" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">1</text>
  <text x="115" y="763" fill="#e3f2fd" font-size="10" font-weight="600">Add Dependency</text>
  <text x="115" y="778" fill="#90a4ae" font-size="9">Gradle / Maven</text>

  <line x1="200" y1="768" x2="225" y2="768" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <circle cx="255" cy="768" r="14" fill="#7b1fa2"/>
  <text x="255" y="773" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">2</text>
  <text x="280" y="763" fill="#e3f2fd" font-size="10" font-weight="600">Configure SPIs</text>
  <text x="280" y="778" fill="#90a4ae" font-size="9">Choose providers</text>

  <line x1="370" y1="768" x2="395" y2="768" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <circle cx="425" cy="768" r="14" fill="#00695c"/>
  <text x="425" y="773" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">3</text>
  <text x="450" y="763" fill="#e3f2fd" font-size="10" font-weight="600">Build Manager</text>
  <text x="450" y="778" fill="#90a4ae" font-size="9">ConversationManager.builder()</text>

  <line x1="560" y1="768" x2="585" y2="768" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <circle cx="615" cy="768" r="14" fill="#e65100"/>
  <text x="615" y="773" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">4</text>
  <text x="640" y="763" fill="#e3f2fd" font-size="10" font-weight="600">Send Messages</text>
  <text x="640" y="778" fill="#90a4ae" font-size="9">addMessage() / getContext()</text>

  <line x1="750" y1="768" x2="775" y2="768" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <circle cx="805" cy="768" r="14" fill="#1b5e20"/>
  <text x="805" y="773" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">5</text>
  <text x="830" y="763" fill="#e3f2fd" font-size="10" font-weight="600">Call Your LLM</text>
  <text x="830" y="778" fill="#90a4ae" font-size="9">Pass context → LLM API</text>

  <line x1="940" y1="768" x2="965" y2="768" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6 -->
  <circle cx="995" cy="768" r="14" fill="#4a148c"/>
  <text x="995" y="773" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">6</text>
