<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="lumiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a4a7a"/>
    </linearGradient>
    <linearGradient id="spiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b4332"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#16202e"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000055"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64b5f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#69f0ae"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffb74d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="#0d1117"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1100" height="60" fill="url(#headerGrad)"/>
  <text x="550" y="22" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="300" letter-spacing="3">LUMI CONVERSATION MANAGER</text>
  <text x="550" y="46" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">LLM Integration Overview — Developer Perspective</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 1: Three user scenarios (top) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="550" y="88" text-anchor="middle" fill="#90caf9" font-size="11" font-weight="600" letter-spacing="2">HOW YOU INTEGRATE</text>

  <!-- Scenario A: Java Library -->
  <rect x="30" y="96" width="320" height="190" rx="10" fill="url(#cardGrad)" stroke="#1e88e5" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="96" width="320" height="32" rx="10" fill="#1e88e5"/>
  <rect x="30" y="116" width="320" height="12" fill="#1e88e5"/>
  <text x="190" y="117" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">📦  Path A — Java Library</text>
  <text x="190" y="140" text-anchor="middle" fill="#90caf9" font-size="10">Add dependency · Use API directly</text>

  <!-- Code snippet box A -->
  <rect x="46" y="152" width="288" height="120" rx="6" fill="#0d1117" stroke="#1e4d7a" stroke-width="1"/>
  <text x="58" y="170" fill="#6a9fb5" font-size="9" font-family="Consolas, monospace">// build.gradle.kts</text>
  <text x="58" y="185" fill="#69f0ae" font-size="9" font-family="Consolas, monospace">implementation("com.lumi:</text>
  <text x="58" y="198" fill="#69f0ae" font-size="9" font-family="Consolas, monospace">  conversation-manager:1.0.0")</text>
  <text x="58" y="216" fill="#6a9fb5" font-size="9" font-family="Consolas, monospace">// Your application code</text>
  <text x="58" y="231" fill="#ffcc02" font-size="9" font-family="Consolas, monospace">var mgr = ConversationManager</text>
  <text x="58" y="244" fill="#ffcc02" font-size="9" font-family="Consolas, monospace">  .builder().tokenBudget(4096)</text>
  <text x="58" y="257" fill="#ffcc02" font-size="9" font-family="Consolas, monospace">  .summarizer(mySummarizer).build();</text>

  <!-- Scenario B: MCP Server -->
  <rect x="390" y="96" width="320" height="190" rx="10" fill="url(#cardGrad)" stroke="#7b1fa2" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="390" y="96" width="320" height="32" rx="10" fill="#7b1fa2"/>
  <rect x="390" y="116" width="320" height="12" fill="#7b1fa2"/>
  <text x="550" y="117" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">🔌  Path B — MCP Server</text>
  <text x="550" y="140" text-anchor="middle" fill="#ce93d8" font-size="10">Claude Code · GitHub Copilot · Any MCP client</text>

  <!-- Code snippet box B -->
  <rect x="406" y="152" width="288" height="120" rx="6" fill="#0d1117" stroke="#4a1466" stroke-width="1"/>
  <text x="418" y="170" fill="#6a9fb5" font-size="9" font-family="Consolas, monospace">// .mcp.json (Claude Code config)</text>
  <text x="418" y="185" fill="#ce93d8" font-size="9" font-family="Consolas, monospace">{  "mcpServers": {</text>
  <text x="418" y="198" fill="#ce93d8" font-size="9" font-family="Consolas, monospace">  "lumi": {</text>
  <text x="418" y="211" fill="#ce93d8" font-size="9" font-family="Consolas, monospace">    "command": "java",</text>
  <text x="418" y="224" fill="#ce93d8" font-size="9" font-family="Consolas, monospace">    "args": ["-jar",</text>
  <text x="418" y="237" fill="#ce93d8" font-size="9" font-family="Consolas, monospace">      "lumi-mcp-server.jar"]</text>
  <text x="418" y="254" fill="#ce93d8" font-size="9" font-family="Consolas, monospace">  }  }</text>

  <!-- Scenario C: CLI -->
  <rect x="750" y="96" width="320" height="190" rx="10" fill="url(#cardGrad)" stroke="#e65100" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="750" y="96" width="320" height="32" rx="10" fill="#e65100"/>
  <rect x="750" y="116" width="320" height="12" fill="#e65100"/>
  <text x="910" y="117" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">⌨️  Path C — CLI Tool</text>
  <text x="910" y="140" text-anchor="middle" fill="#ffcc80" font-size="10">Scripts · Automation · DevOps pipelines</text>

  <!-- Code snippet box C -->
  <rect x="766" y="152" width="288" height="120" rx="6" fill="#0d1117" stroke="#7a2f00" stroke-width="1"/>
  <text x="778" y="170" fill="#6a9fb5" font-size="9" font-family="Consolas, monospace"># Shell / PowerShell</text>
  <text x="778" y="185" fill="#ffb74d" font-size="9" font-family="Consolas, monospace">lumi session create --budget 4096</text>
  <text x="778" y="200" fill="#ffb74d" font-size="9" font-family="Consolas, monospace">lumi msg add "Hello, assistant"</text>
  <text x="778" y="215" fill="#ffb74d" font-size="9" font-family="Consolas, monospace">lumi context get</text>
  <text x="778" y="232" fill="#6a9fb5" font-size="9" font-family="Consolas, monospace"># Returns compressed context</text>
  <text x="778" y="247" fill="#ffb74d" font-size="9" font-family="Consolas, monospace">lumi task complete --id task-1</text>
  <text x="778" y="262" fill="#ffb74d" font-size="9" font-family="Consolas, monospace">lumi session export --format json</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROWS: scenarios → Lumi core -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="190" y1="286" x2="190" y2="332" stroke="#1e88e5" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="550" y1="286" x2="550" y2="332" stroke="#7b1fa2" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="910" y1="286" x2="910" y2="332" stroke="#e65100" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 2: Lumi Conversation Manager core -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="332" width="1040" height="230" rx="12" fill="url(#lumiGrad)" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="332" width="1040" height="36" rx="12" fill="#0d47a1"/>
  <rect x="30" y="352" width="1040" height="16" fill="#0d47a1"/>
  <text x="550" y="356" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">🧠  Lumi Conversation Manager  —  Core Engine</text>

  <!-- ConversationManager API box -->
  <rect x="50" y="378" width="220" height="164" rx="8" fill="#0a2540" stroke="#1e88e5" stroke-width="1.5"/>
  <text x="160" y="398" text-anchor="middle" fill="#90caf9" font-size="11" font-weight="700">ConversationManager API</text>
  <line x1="60" y1="404" x2="260" y2="404" stroke="#1e4d7a" stroke-width="1"/>
  <text x="68" y="420" fill="#e3f2fd" font-size="10" font-family="Consolas, monospace">addMessage(role, content)</text>
  <text x="68" y="436" fill="#e3f2fd" font-size="10" font-family="Consolas, monospace">getContext() → List&lt;Msg&gt;</text>
  <text x="68" y="452" fill="#e3f2fd" font-size="10" font-family="Consolas, monospace">markTaskComplete(taskId)</text>
  <text x="68" y="468" fill="#e3f2fd" font-size="10" font-family="Consolas, monospace">rollback(seqId)</text>
  <text x="68" y="484" fill="#e3f2fd" font-size="10" font-family="Consolas, monospace">createCheckpoint()</text>
  <text x="68" y="500" fill="#e3f2fd" font-size="10" font-family="Consolas, monospace">restoreCheckpoint(id)</text>
  <text x="68" y="520" fill="#64b5f6" font-size="9">Thread-safe · Builder pattern</text>
  <text x="68" y="534" fill="#64b5f6" font-size="9">Fluent configuration API</text>

  <!-- MemoryFunnelEngine -->
  <rect x="290" y="378" width="220" height="164" rx="8" fill="#0a2540" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="400" y="398" text-anchor="middle" fill="#90caf9" font-size="11" font-weight="700">MemoryFunnelEngine</text>
  <line x1="300" y1="404" x2="500" y2="404" stroke="#1e4d7a" stroke-width="1"/>
  <text x="308" y="422" fill="#81d4fa" font-size="10">🔄 Shadow-Buffer Architecture</text>
  <text x="308" y="440" fill="#e3f2fd" font-size="9">• Primary buffer (live messages)</text>
  <text x="308" y="456" fill="#e3f2fd" font-size="9">• Shadow buffer (async compress)</text>
  <text x="308" y="472" fill="#e3f2fd" font-size="9">• Lock-free addMessage()</text>
  <text x="308" y="488" fill="#e3f2fd" font-size="9">• State machine: READY →</text>
  <text x="308" y="502" fill="#e3f2fd" font-size="9">  COMPRESSING → MERGING</text>
  <text x="308" y="520" fill="#64b5f6" font-size="9">Auto token-budget enforcement</text>
  <text x="308" y="534" fill="#64b5f6" font-size="9">Delta-patch rollback support</text>

  <!-- TaskTracker + ContextBroker -->
  <rect x="530" y="378" width="220" height="164" rx="8" fill="#0a2540" stroke="#26c6da" stroke-width="1.5"/>
  <text x="640" y="398" text-anchor="middle" fill="#90caf9" font-size="11" font-weight="700">Task &amp; Context Layer</text>
  <line x1="540" y1="404" x2="740" y2="404" stroke="#1e4d7a" stroke-width="1"/>
  <text x="548" y="422" fill="#80deea" font-size="10">📋 TaskTracker</text>
  <text x="548" y="438" fill="#e3f2fd" font-size="9">• Multi-task conversation scope</text>
  <text x="548" y="454" fill="#e3f2fd" font-size="9">• Priority-based eviction</text>
  <text x="548" y="470" fill="#e3f2fd" font-size="9">• Task completion signals</text>
  <line x1="548" y1="480" x2="730" y2="480" stroke="#1e4d7a" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="548" y="496" fill="#80deea" font-size="10">🔗 ContextBroker</text>
  <text x="548" y="512" fill="#e3f2fd" font-size="9">• SPI orchestration layer</text>
  <text x="548" y="528" fill="#e3f2fd" font-size="9">• Sanitize → Summarize → Store</text>

  <!-- SPI Customization -->
  <rect x="770" y="378" width="280" height="164" rx="8" fill="#0a2540" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="910" y="396" text-anchor="middle" fill="#a5d6a7" font-size="11" font-weight="700">🔧 SPI — Plug In Your Own</text>
  <line x1="780" y1="403" x2="1040" y2="403" stroke="#1b4332" stroke-width="1"/>
  <text x="788" y="420" fill="#c8e6c9" font-size="9" font-family="Consolas, monospace">Summarizer      → OpenAI / Claude</text>
  <text x="788" y="436" fill="#c8e6c9" font-size="9" font-family="Consolas, monospace">ChatStorage     → DB / Redis / S3</text>
  <text x="788" y="452" fill="#c8e6c9" font-size="9" font-family="Consolas, monospace">TokenCounter    → tiktoken / custom</text>
  <text x="788" y="468" fill="#c8e6c9" font-size="9" font-family="Consolas, monospace">RetentionPolicy → time / priority</text>
  <text x="788" y="484" fill="#c8e6c9" font-size="9" font-family="Consolas, monospace">Sanitizer       → PII / content filter</text>
  <text x="788" y="500" fill="#c8e6c9" font-size="9" font-family="Consolas, monospace">Encryptor       → AES-256 / KMS</text>
  <text x="788" y="516" fill="#a5d6a7" font-size="9">Defaults provided — override any</text>
  <text x="788" y="530" fill="#a5d6a7" font-size="9">interface for your use case</text>

  <!-- Arrows between core components -->
  <line x1="270" y1="460" x2="290" y2="460" stroke="#42a5f5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="460" x2="530" y2="460" stroke="#42a5f5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="460" x2="770" y2="460" stroke="#66bb6a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROWS: Lumi → LLM providers -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="550" y1="562" x2="550" y2="606" stroke="#69f0ae" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="560" y="588" fill="#69f0ae" font-size="9">getContext()</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 3: LLM Providers -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="550" y="624" text-anchor="middle" fill="#a5d6a7" font-size="11" font-weight="600" letter-spacing="2">YOUR LLM PROVIDER</text>

  <!-- OpenAI -->
  <rect x="30" y="634" width="230" height="70" rx="8" fill="#0a2d1f" stroke="#69f0ae" stroke-width="1.5"/>
  <text x="145" y="658" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">OpenAI</text>
  <text x="145" y="676" text-anchor="middle" fill="#a5d6a7" font-size="10">GPT-4o · GPT-4 Turbo</text>
  <text x="145" y="692" text-anchor="middle" fill="#69f0ae" font-size="9">Summarizer SPI → OpenAI SDK</text>

  <!-- Anthropic -->
  <rect x="282" y="634" width="230" height="70" rx="8" fill="#0a2d1f" stroke="#69f0ae" stroke-width="1.5"/>
  <text x="397" y="658" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Anthropic</text>
  <text x="397" y="676" text-anchor="middle" fill="#a5d6a7" font-size="10">Claude 3.5 · Claude 3 Opus</text>
  <text x="397" y="692" text-anchor="middle" fill="#69f0ae" font-size="9">Summarizer SPI → Anthropic SDK</text>

  <!-- Google -->
  <rect x="534" y="634" width="230" height="70" rx="8" fill="#0a2d1f" stroke="#69f0ae" stroke-width="1.5"/>
  <text x="649" y="658" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Google</text>
  <text x="649" y="676" text-anchor="middle" fill="#a5d6a7" font-size="10">Gemini 2.0 · Gemini Pro</text>
  <text x="649" y="692" text-anchor="middle" fill="#69f0ae" font-size="9">Summarizer SPI → Gemini SDK</text>

  <!-- Custom / Local -->
  <rect x="786" y="634" width="284" height="70" rx="8" fill="#0a2d1f" stroke="#69f0ae" stroke-width="1.5"/>
  <text x="928" y="658" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Custom / Local</text>
  <text x="928" y="676" text-anchor="middle" fill="#a5d6a7" font-size="10">Ollama · LM Studio · Any HTTP LLM</text>
  <text x="928" y="692" text-anchor="middle" fill="#69f0ae" font-size="9">Implement Summarizer interface</text>

  <!-- arrows from lumi to each provider -->
  <line x1="300" y1="562" x2="145" y2="634" stroke="#1b4332" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="450" y1="562" x2="397" y2="634" stroke="#1b4332" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="650" y1="562" x2="649" y2="634" stroke="#1b4332" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="800" y1="562" x2="928" y2="634" stroke="#1b4332" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- ═══════════════════════════════════════════════════════ -->
