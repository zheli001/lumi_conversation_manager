  <text x="1020" y="778" fill="#90a4ae" font-size="9">Token budget auto</text>

  <!-- Footer -->
  <text x="550" y="813" text-anchor="middle" fill="#37474f" font-size="9">Lumi Conversation Manager · github.com/zheli001/lumi_conversation_manager · MIT License</text>
