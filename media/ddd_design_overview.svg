<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"
     font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="da" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="dag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="dar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#DC2626"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/></filter>
  </defs>

  <rect width="1200" height="800" fill="#F0F4FF"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="62" fill="#0F172A"/>
  <text x="600" y="32" fill="white" font-size="20" font-weight="700"
        text-anchor="middle" dominant-baseline="middle">
    MemoryFunnel — Detailed Design · State Machine &amp; Data Model
  </text>
  <text x="600" y="52" fill="#94A3B8" font-size="11" text-anchor="middle" dominant-baseline="middle">
    Engine state machine · ChatMessage class model · Delta Patch algorithm · Task lifecycle
  </text>

  <!-- ── TOP-LEFT: State Machine ── -->
  <rect x="20" y="75" width="560" height="350" rx="12" fill="white" filter="url(#sh)"/>
  <text x="300" y="100" fill="#0F172A" font-size="14" font-weight="700" text-anchor="middle">
    Engine State Machine
  </text>

  <!-- READY -->
  <ellipse cx="300" cy="148" rx="78" ry="32" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="300" y="148" fill="#1E40AF" font-size="13" font-weight="700" text-anchor="middle" dominant-baseline="middle">READY</text>

  <!-- Self-loop: addMessage -->
  <path d="M222 135 C180 100 180 170 220 162" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#da)"/>
  <text x="168" y="138" fill="#3B82F6" font-size="9">addMessage()</text>

  <!-- READY → COMPRESSING -->
  <line x1="300" y1="180" x2="300" y2="213" stroke="#D97706" stroke-width="2" marker-end="url(#dao)"/>
  <marker id="dao" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#D97706"/>
  </marker>
  <text x="308" y="200" fill="#B45309" font-size="9">token threshold / markTaskComplete()</text>

  <!-- COMPRESSING -->
  <ellipse cx="300" cy="248" rx="100" ry="32" fill="#FFF7ED" stroke="#D97706" stroke-width="2"/>
  <text x="300" y="248" fill="#92400E" font-size="13" font-weight="700" text-anchor="middle" dominant-baseline="middle">COMPRESSING</text>
  <text x="410" y="252" fill="#B45309" font-size="9">(background — primary writable)</text>

  <!-- COMPRESSING → MERGING -->
  <line x1="300" y1="280" x2="300" y2="313" stroke="#6B7280" stroke-width="2" marker-end="url(#da)"/>
  <text x="308" y="300" fill="#4B5563" font-size="9">compression done → Delta Patch</text>

  <!-- MERGING -->
  <ellipse cx="300" cy="348" rx="90" ry="32" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="300" y="348" fill="#1F2937" font-size="13" font-weight="700" text-anchor="middle" dominant-baseline="middle">MERGING</text>
  <text x="396" y="352" fill="#6B7280" font-size="9">(WriteLock · milliseconds)</text>

  <!-- MERGING → PURGING -->
  <line x1="210" y1="360" x2="180" y2="380" stroke="#7C3AED" stroke-width="2" marker-end="url(#da)"/>
  <rect x="60" y="382" width="116" height="52" rx="8" fill="#F3E8FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="118" y="404" fill="#5B21B6" font-size="12" font-weight="700" text-anchor="middle">PURGING</text>
  <text x="118" y="420" fill="#6D28D9" font-size="9" text-anchor="middle">Task eviction</text>

  <!-- MERGING → READY -->
  <line x1="390" y1="348" x2="450" y2="280" stroke="#059669" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#dag)"/>
  <text x="445" y="322" fill="#059669" font-size="9">merge done</text>
  <line x1="450" y1="280" x2="450" y2="180" stroke="#059669" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="450" y1="180" x2="378" y2="155" stroke="#059669" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#dag)"/>

  <!-- PURGING → READY -->
  <line x1="118" y1="382" x2="118" y2="148" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="118" y1="148" x2="222" y2="148" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#dag)"/>
  <text x="80" y="262" fill="#059669" font-size="9" transform="rotate(-90 80 262)">cleanup done</text>

  <!-- ROLLBACK terminal -->
  <rect x="440" y="382" width="120" height="52" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="500" y="404" fill="#991B1B" font-size="12" font-weight="700" text-anchor="middle">ROLLBACK</text>
  <text x="500" y="420" fill="#DC2626" font-size="9" text-anchor="middle">(terminal action)</text>
  <line x1="390" y1="362" x2="440" y2="393" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#dar)"/>
  <text x="430" y="372" fill="#DC2626" font-size="9">rollback(seqId)</text>

  <!-- ── TOP-RIGHT: Data Model ── -->
  <rect x="600" y="75" width="580" height="350" rx="12" fill="white" filter="url(#sh)"/>
  <text x="890" y="100" fill="#0F172A" font-size="14" font-weight="700" text-anchor="middle">
    Core Data Model (POJOs)
  </text>

  <!-- ChatMessage -->
  <rect x="620" y="112" width="260" height="212" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <rect x="620" y="112" width="260" height="32" rx="8" fill="#2563EB"/>
  <rect x="620" y="132" width="260" height="12" fill="#2563EB"/>
  <text x="750" y="130" fill="white" font-size="12" font-weight="700" text-anchor="middle">ChatMessage (record)</text>
  <text x="636" y="160" fill="#1E40AF" font-size="10" font-family="Courier New, monospace">long     sequenceId</text>
  <text x="636" y="177" fill="#1E40AF" font-size="10" font-family="Courier New, monospace">String   role</text>
  <text x="636" y="194" fill="#1E40AF" font-size="10" font-family="Courier New, monospace">List     content</text>
  <text x="636" y="211" fill="#1E40AF" font-size="10" font-family="Courier New, monospace">String   taskId</text>
  <text x="636" y="228" fill="#1E40AF" font-size="10" font-family="Courier New, monospace">boolean  isDeleted</text>
  <text x="636" y="245" fill="#1E40AF" font-size="10" font-family="Courier New, monospace">boolean  sensitive</text>
  <text x="636" y="262" fill="#1E40AF" font-size="10" font-family="Courier New, monospace">long     timestampMs</text>
  <line x1="626" y1="272" x2="874" y2="272" stroke="#BFDBFE"/>
  <text x="636" y="290" fill="#3B82F6" font-size="9">+ text(role, content)</text>
  <text x="636" y="306" fill="#3B82F6" font-size="9">+ textForTask(role, content, taskId)</text>
  <text x="636" y="320" fill="#3B82F6" font-size="9">+ toText(): String</text>

  <!-- ContentBlock -->
  <rect x="620" y="336" width="260" height="80" rx="8" fill="#F0FDF4" stroke="#059669" stroke-width="1.5"/>
  <rect x="620" y="336" width="260" height="26" rx="8" fill="#059669"/>
  <rect x="620" y="350" width="260" height="12" fill="#059669"/>
  <text x="750" y="351" fill="white" font-size="11" font-weight="700" text-anchor="middle">ContentBlock (record)</text>
  <text x="636" y="374" fill="#065F46" font-size="10" font-family="Courier New, monospace">String  type (text|image_url|file_ref)</text>
  <text x="636" y="391" fill="#065F46" font-size="10" font-family="Courier New, monospace">String  value · String mimeType</text>
  <text x="636" y="408" fill="#065F46" font-size="10" font-family="Courier New, monospace">long  sizeBytes · Map meta</text>

  <!-- Composition arrow -->
  <line x1="750" y1="324" x2="750" y2="336" stroke="#059669" stroke-width="1.5" marker-end="url(#dag)"/>
  <text x="756" y="333" fill="#059669" font-size="9">1..*</text>

  <!-- SessionSnapshot -->
  <rect x="900" y="112" width="260" height="200" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="900" y="112" width="260" height="32" rx="8" fill="#7C3AED"/>
  <rect x="900" y="132" width="260" height="12" fill="#7C3AED"/>
  <text x="1030" y="130" fill="white" font-size="12" font-weight="700" text-anchor="middle">SessionSnapshot</text>
  <text x="916" y="160" fill="#5B21B6" font-size="10" font-family="Courier New, monospace">String   sessionId</text>
  <text x="916" y="177" fill="#5B21B6" font-size="10" font-family="Courier New, monospace">long     snapshotSeqId</text>
  <text x="916" y="194" fill="#5B21B6" font-size="10" font-family="Courier New, monospace">List     history</text>
  <text x="916" y="211" fill="#5B21B6" font-size="10" font-family="Courier New, monospace">Map      taskStates</text>
  <text x="916" y="228" fill="#5B21B6" font-size="10" font-family="Courier New, monospace">Map      engineContext</text>
  <text x="916" y="245" fill="#5B21B6" font-size="10" font-family="Courier New, monospace">String   contentHash</text>
  <text x="916" y="262" fill="#5B21B6" font-size="10" font-family="Courier New, monospace">long     capturedAtMs</text>
  <line x1="906" y1="272" x2="1154" y2="272" stroke="#DDD6FE"/>
  <text x="916" y="290" fill="#7C3AED" font-size="9">+ capture(engine)</text>
  <text x="916" y="306" fill="#7C3AED" font-size="9">Checksum verified on restore</text>

  <!-- TaskState -->
  <rect x="900" y="326" width="260" height="90" rx="8" fill="#FEF9C3" stroke="#CA8A04" stroke-width="1.5"/>
  <rect x="900" y="326" width="260" height="26" rx="8" fill="#CA8A04"/>
  <rect x="900" y="340" width="260" height="12" fill="#CA8A04"/>
  <text x="1030" y="341" fill="white" font-size="11" font-weight="700" text-anchor="middle">TaskState (enum)</text>
  <text x="916" y="364" fill="#78350F" font-size="11">ACTIVE</text>
  <text x="1030" y="364" fill="#92400E" font-size="10">In progress; full context</text>
  <text x="916" y="382" fill="#78350F" font-size="11">COMPLETING</text>
  <text x="1030" y="382" fill="#92400E" font-size="10">Eviction queued</text>
  <text x="916" y="400" fill="#78350F" font-size="11">EVICTED</text>
  <text x="1030" y="400" fill="#92400E" font-size="10">Synopsis only remains</text>

  <!-- ── BOTTOM-LEFT: Delta Patch Algorithm ── -->
  <rect x="20" y="440" width="560" height="330" rx="12" fill="white" filter="url(#sh)"/>
  <text x="300" y="465" fill="#0F172A" font-size="14" font-weight="700" text-anchor="middle">
    Delta Patch Algorithm
  </text>

  <rect x="40" y="478" width="520" height="56" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="60" y="498" fill="#1E293B" font-size="11" font-weight="700">Precondition: Shadow clone taken at anchor = lastSeqId</text>
  <text x="60" y="516" fill="#475569" font-size="10">Primary continues accepting writes during compression (msg7, msg8... added)</text>

  <line x1="300" y1="534" x2="300" y2="548" stroke="#475569" stroke-width="1.5" marker-end="url(#da)"/>

  <rect x="40" y="550" width="250" height="72" rx="6" fill="#FFF7ED" stroke="#D97706" stroke-width="1.5"/>
  <text x="165" y="572" fill="#92400E" font-size="11" font-weight="700" text-anchor="middle">Shadow Result</text>
  <text x="60" y="590" fill="#B45309" font-size="10" font-family="Courier New, monospace">[synopsis_msg]</text>
  <text x="60" y="608" fill="#B45309" font-size="10">"Earlier: user asked about X, Y..."</text>

  <rect x="310" y="550" width="250" height="72" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="435" y="572" fill="#1E40AF" font-size="11" font-weight="700" text-anchor="middle">Delta (new writes)</text>
  <text x="325" y="590" fill="#2563EB" font-size="10" font-family="Courier New, monospace">filter(seqId &gt; anchor)</text>
  <text x="325" y="608" fill="#2563EB" font-size="10">[msg7] [msg8] [msg9] ← no loss</text>

  <line x1="165" y1="622" x2="165" y2="636" stroke="#475569" stroke-width="1.5" marker-end="url(#da)"/>
  <line x1="435" y1="622" x2="435" y2="636" stroke="#475569" stroke-width="1.5" marker-end="url(#da)"/>

  <rect x="40" y="638" width="520" height="56" rx="6" fill="#F0FDF4" stroke="#059669" stroke-width="2"/>
  <text x="300" y="660" fill="#065F46" font-size="12" font-weight="700" text-anchor="middle">Merged Result (WriteLock → atomic swap)</text>
  <text x="300" y="678" fill="#047857" font-size="10" text-anchor="middle" font-family="Courier New, monospace">[synopsis_msg] [msg7] [msg8] [msg9]</text>

  <rect x="40" y="706" width="520" height="54" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="300" y="724" fill="#0F172A" font-size="11" font-weight="700" text-anchor="middle">Invariants</text>
  <text x="60" y="742" fill="#475569" font-size="10">✓ No message lost   ✓ Chronological order preserved   ✓ WriteLock held for ms only</text>
  <text x="60" y="756" fill="#475569" font-size="10">✓ CAS prevents double-compression   ✓ Rollback cancels shadow task safely</text>

  <!-- ── BOTTOM-RIGHT: SPI &amp; Task Eviction Flow ── -->
  <rect x="600" y="440" width="580" height="330" rx="12" fill="white" filter="url(#sh)"/>
  <text x="890" y="465" fill="#0F172A" font-size="14" font-weight="700" text-anchor="middle">
    Task Eviction &amp; getContext() SPI Chain
  </text>

  <!-- Task eviction -->
  <text x="620" y="490" fill="#5B21B6" font-size="12" font-weight="700">markTaskComplete(taskId) Flow</text>
  <rect x="620" y="498" width="540" height="110" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>

  <text x="636" y="518" fill="#5B21B6" font-size="10">① TaskTracker: ACTIVE → COMPLETING</text>
  <line x1="636" y1="524" x2="636" y2="534" stroke="#7C3AED" stroke-width="1"/>
  <text x="636" y="544" fill="#5B21B6" font-size="10">② Summarizer.summarize(task messages) — async CompletableFuture</text>
  <line x1="636" y1="550" x2="636" y2="560" stroke="#7C3AED" stroke-width="1"/>
  <text x="636" y="570" fill="#5B21B6" font-size="10">③ On synopsis ready → WriteLock:</text>
  <text x="654" y="586" fill="#5B21B6" font-size="10" font-family="Courier New, monospace">remove task messages · insert synopsis · TaskState → EVICTED</text>
  <text x="636" y="602" fill="#5B21B6" font-size="10">④ MetricsProvider.record("task.evicted", taskId, tokensSaved)</text>

  <!-- getContext flow -->
  <text x="620" y="632" fill="#1E40AF" font-size="12" font-weight="700">getContext() SPI Execution Order</text>
  <rect x="620" y="640" width="540" height="120" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>

  <text x="636" y="660" fill="#1E40AF" font-size="10">① Sanitizer.sanitize(messages) — PII interception (returns new list)</text>
  <line x1="636" y1="666" x2="636" y2="673" stroke="#2563EB" stroke-width="1"/>
  <text x="636" y="683" fill="#1E40AF" font-size="10">② Assemble: [HEADER / pinned] + [SYNOPSIS zone] + [ACTIVE BUFFER zone]</text>
  <line x1="636" y1="689" x2="636" y2="696" stroke="#2563EB" stroke-width="1"/>
  <text x="636" y="706" fill="#1E40AF" font-size="10">③ RetentionPolicy.evict(assembled, tokenBudget, counter) — prune to fit</text>
  <line x1="636" y1="712" x2="636" y2="719" stroke="#2563EB" stroke-width="1"/>
  <text x="636" y="729" fill="#1E40AF" font-size="10">④ TokenCounter.countAll(final) — total token cost</text>
  <line x1="636" y1="735" x2="636" y2="742" stroke="#2563EB" stroke-width="1"/>
  <text x="636" y="752" fill="#1E40AF" font-size="10">⑤ MetricsProvider.record("context.assembled", tokenCount)</text>
  <text x="636" y="768" fill="#059669" font-size="10" font-weight="700">→ return ContextResult(messages, tokenCount, truncated)</text>
</svg>