  <!-- PHASE 0: Foundation (Day 1-3) -->
  <rect x="20" y="107" width="1160" height="88" rx="0" fill="white"/>
  <rect x="20" y="107" width="230" height="88" fill="#DBEAFE"/>
  <text x="30" y="127" fill="#1E40AF" font-size="11" font-weight="700">Phase 0 · Foundation</text>
  <text x="30" y="143" fill="#1E40AF" font-size="10">Day 1–3</text>
  <text x="30" y="159" fill="#1E40AF" font-size="9">● ChatMessage + ContentBlock records</text>
  <text x="30" y="173" fill="#1E40AF" font-size="9">● All 8 SPI interfaces defined</text>
  <text x="30" y="187" fill="#1E40AF" font-size="9">● Builder API + ConversationManager API</text>
  <!-- Bar -->
  <rect x="260" y="122" width="108" height="26" rx="6" fill="#2563EB"/>
  <text x="314" y="138" fill="white" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle">Days 1–3</text>
