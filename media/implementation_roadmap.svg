  <text x="380" y="91" fill="#94A3B8" font-size="9" text-anchor="middle" dominant-baseline="middle">Day 5</text>
  <text x="500" y="91" fill="#94A3B8" font-size="9" text-anchor="middle" dominant-baseline="middle">Day 10</text>
  <text x="620" y="91" fill="#94A3B8" font-size="9" text-anchor="middle" dominant-baseline="middle">Day 15</text>
