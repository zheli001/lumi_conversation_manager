  <text x="264" y="166" fill="#475569" font-size="9">ChatMessage · ContentBlock · SessionSnapshot · TaskState</text>
  <text x="264" y="181" fill="#475569" font-size="9">ChatStorage · TokenCounter · RetentionPolicy · Summarizer</text>
  <text x="264" y="196" fill="#475569" font-size="9">Sanitizer · Encryptor · MetricsProvider · ExecutorFactory</text>

  <!-- PHASE 1: Core Engine (Day 4-7) -->
  <rect x="20" y="195" width="1160" height="88" rx="0" fill="#F8FAFC"/>
  <rect x="20" y="195" width="230" height="88" fill="#ECFDF5"/>
  <text x="30" y="215" fill="#065F46" font-size="11" font-weight="700">Phase 1 · Core Engine</text>
  <text x="30" y="231" fill="#065F46" font-size="10">Day 4–7</text>
  <text x="30" y="247" fill="#065F46" font-size="9">● MemoryFunnelEngine state machine</text>
  <text x="30" y="261" fill="#065F46" font-size="9">● SessionContext + StampedLock</text>
  <text x="30" y="275" fill="#065F46" font-size="9">● InMemoryStorage + CharBasedCounter</text>
  <rect x="368" y="210" width="144" height="26" rx="6" fill="#059669"/>
  <text x="440" y="226" fill="white" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle">Days 4–7</text>
  <text x="264" y="254" fill="#475569" font-size="9">MemoryFunnelEngine · SessionContext · ContextBroker · TaskTracker</text>
  <text x="264" y="269" fill="#475569" font-size="9">InMemoryStorage · CharacterBasedTokenCounter · SlidingWindowPolicy</text>
  <text x="264" y="284" fill="#475569" font-size="9">BlockingSanitizer · NoOpSummarizer · NoOpMetrics · ConversationManagerBuilder</text>

  <!-- PHASE 2: Smart Memory (Day 8-14) -->
  <rect x="20" y="283" width="1160" height="88" rx="0" fill="white"/>
  <rect x="20" y="283" width="230" height="88" fill="#FFF7ED"/>
  <text x="30" y="303" fill="#92400E" font-size="11" font-weight="700">Phase 2 · Smart Memory</text>
  <text x="30" y="319" fill="#92400E" font-size="10">Day 8–14</text>
  <text x="30" y="335" fill="#92400E" font-size="9">● Shadow-Buffer async engine</text>
  <text x="30" y="349" fill="#92400E" font-size="9">● DeltaPatcher merge algorithm</text>
  <text x="30" y="363" fill="#92400E" font-size="9">● Task eviction + ImportanceDecay</text>
  <rect x="512" y="298" width="216" height="26" rx="6" fill="#D97706"/>
  <text x="620" y="314" fill="white" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle">Days 8–14</text>
  <text x="264" y="342" fill="#475569" font-size="9">DeltaPatcher.applyShadowMerge() · SessionContext.beginShadow()</text>
  <text x="264" y="357" fill="#475569" font-size="9">ContextBroker.checkAndTriggerCompression() · TaskTracker.transition()</text>
  <text x="264" y="372" fill="#475569" font-size="9">SessionContext.evictTask() · rollback() · cancelShadowTask()</text>

  <!-- PHASE 3: Security & Media (Day 15-18) -->
  <rect x="20" y="371" width="1160" height="88" rx="0" fill="#F8FAFC"/>
  <rect x="20" y="371" width="230" height="88" fill="#FEF2F2"/>
  <text x="30" y="391" fill="#991B1B" font-size="11" font-weight="700">Phase 3 · Security &amp; Media</text>
  <text x="30" y="407" fill="#991B1B" font-size="10">Day 15–18</text>
  <text x="30" y="423" fill="#991B1B" font-size="9">● Sanitizer SPI + PII policy</text>
  <text x="30" y="437" fill="#991B1B" font-size="9">● ContentBlock multimedia model</text>
  <text x="30" y="451" fill="#991B1B" font-size="9">● SessionSnapshot checkpoint + Encryptor</text>
  <rect x="728" y="386" width="120" height="26" rx="6" fill="#DC2626"/>
  <text x="788" y="402" fill="white" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle">Days 15–18</text>
  <text x="264" y="430" fill="#475569" font-size="9">BlockingSanitizer · RegexSanitizer · SecretValue wrapper</text>
  <text x="264" y="445" fill="#475569" font-size="9">ContentBlock.isMedia() · SnapshotRestorer · Path Validator</text>
  <text x="264" y="460" fill="#475569" font-size="9">AesEncryptor (optional) · Checksum verify · InconsistentStateException</text>

  <!-- PHASE 4: Integration (Day 19-21) -->
  <rect x="20" y="459" width="1160" height="88" rx="0" fill="white"/>
  <rect x="20" y="459" width="230" height="88" fill="#F5F3FF"/>
  <text x="30" y="479" fill="#5B21B6" font-size="11" font-weight="700">Phase 4 · Integration</text>
  <text x="30" y="495" fill="#5B21B6" font-size="10">Day 19–21</text>
  <text x="30" y="511" fill="#5B21B6" font-size="9">● Optional: RedisStorage, JdbcStorage</text>
  <text x="30" y="525" fill="#5B21B6" font-size="9">● Optional: Spring Boot Starter</text>
  <text x="30" y="539" fill="#5B21B6" font-size="9">● Benchmark report + usage examples</text>
  <rect x="848" y="474" width="108" height="26" rx="6" fill="#7C3AED"/>
  <text x="902" y="490" fill="white" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle">Days 19–21</text>
  <text x="264" y="518" fill="#475569" font-size="9">RedisStorage · JdbcStorage · TiktokenCounter · OpenAISummarizer</text>
  <text x="264" y="533" fill="#475569" font-size="9">spring-boot-starter module · ConversationManagerAutoConfiguration</text>
  <text x="264" y="548" fill="#475569" font-size="9">BasicUsageExample · MultiTaskExample · CheckpointRestoreExample</text>

  <!-- PHASE 5: Hardening (Day 22-25) -->
  <rect x="20" y="547" width="1160" height="88" rx="0" fill="#F8FAFC"/>
  <rect x="20" y="547" width="230" height="88" fill="#F0FDF4"/>
  <text x="30" y="567" fill="#065F46" font-size="11" font-weight="700">Phase 5 · Hardening</text>
  <text x="30" y="583" fill="#065F46" font-size="10">Day 22–25</text>
  <text x="30" y="599" fill="#065F46" font-size="9">● Concurrency stress tests</text>
  <text x="30" y="613" fill="#065F46" font-size="9">● Edge-case injection tests</text>
  <text x="30" y="627" fill="#065F46" font-size="9">● ADR finalization + 1.0.0 release</text>
  <rect x="956" y="562" width="108" height="26" rx="6" fill="#059669"/>
  <text x="1010" y="578" fill="white" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle">Days 22–25</text>
  <text x="264" y="606" fill="#475569" font-size="9">stressTest_concurrentWrites · stressTest_writesDuringCompression</text>
  <text x="264" y="621" fill="#475569" font-size="9">testRollback_duringMerge · testCheckpoint_integrityCheck (13 mandatory)</text>
  <text x="264" y="636" fill="#475569" font-size="9">v1.0.0-RELEASE tag · GitHub Packages publish · ADR documentation</text>

  <!-- Footer milestone -->
  <rect x="20" y="640" width="1160" height="32" rx="0" fill="#0F172A"/>
  <text x="600" y="658" fill="#A7F3D0" font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="middle">
    🎯 v1.0.0 Release — Day 25 · Production-ready · 100% concurrency branch coverage · Zero external runtime deps
  </text>
