<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680"
     font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/></filter>
  </defs>

  <rect width="1200" height="680" fill="#F0F4FF"/>

  <!-- Header -->
