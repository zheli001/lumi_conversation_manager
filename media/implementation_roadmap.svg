  <text x="860" y="91" fill="#94A3B8" font-size="9" text-anchor="middle" dominant-baseline="middle">Day 21</text>
  <text x="980" y="91" fill="#94A3B8" font-size="9" text-anchor="middle" dominant-baseline="middle">Day 24</text>
  <text x="1160" y="91" fill="#64748B" font-size="9" text-anchor="end" dominant-baseline="middle">Day 25</text>

