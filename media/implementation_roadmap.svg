    MemoryFunnel — Implementation Roadmap
  </text>
  <text x="600" y="52" fill="#94A3B8" font-size="11" text-anchor="middle" dominant-baseline="middle">
    6-phase delivery plan · ~25 working days · Java 17 production-ready release
  </text>

  <!-- Timeline header -->
  <rect x="20" y="75" width="1160" height="32" rx="8" fill="#1E293B"/>
