<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740"
     font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C3AED"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="740" fill="#F0F4FF"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="68" fill="#0F172A"/>
  <text x="600" y="38" fill="white" font-size="21" font-weight="700"
        text-anchor="middle" dominant-baseline="middle">
    MemoryFunnel — Lumi Conversation Manager
  </text>
  <text x="600" y="58" fill="#94A3B8" font-size="12"
        text-anchor="middle" dominant-baseline="middle">
    Product Requirements Document · White Paper Overview
  </text>

  <!-- ── COL 1: PROBLEMS ── -->
  <rect x="24" y="84" width="358" height="618" rx="12" fill="white" filter="url(#sh)"/>
  <rect x="24" y="84" width="358" height="42" rx="12" fill="#DC2626"/>
  <rect x="24" y="112" width="358" height="14" fill="#DC2626"/>
  <text x="203" y="109" fill="white" font-size="14" font-weight="700" text-anchor="middle">
    ⚠  The Problem
  </text>

  <!-- P-cards -->
  <rect x="40" y="144" width="326" height="108" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
  <text x="58" y="166" fill="#991B1B" font-size="13" font-weight="700">Context Window Overflow</text>
  <text x="58" y="186" fill="#7F1D1D" font-size="11">LLM APIs cap input at 128k–200k tokens.</text>
  <text x="58" y="203" fill="#7F1D1D" font-size="11">Naive truncation destroys conversation</text>
  <text x="58" y="220" fill="#7F1D1D" font-size="11">coherence and forgets the system prompt.</text>
  <text x="58" y="240" fill="#DC2626" font-size="18">📉 400 errors, confused LLM responses</text>

  <rect x="40" y="264" width="326" height="108" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
  <text x="58" y="286" fill="#991B1B" font-size="13" font-weight="700">Token Cost Explosion</text>
  <text x="58" y="306" fill="#7F1D1D" font-size="11">30–60% of tokens sent per call are</text>
  <text x="58" y="323" fill="#7F1D1D" font-size="11">semantically redundant after a task closes.</text>
  <text x="58" y="340" fill="#7F1D1D" font-size="11">Completed reasoning steps sent repeatedly.</text>
  <text x="58" y="358" fill="#DC2626" font-size="18">💸 Runaway API billing with no control</text>

  <rect x="40" y="384" width="326" height="94" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
  <text x="58" y="406" fill="#991B1B" font-size="13" font-weight="700">PII / Prompt Security Gap</text>
  <text x="58" y="426" fill="#7F1D1D" font-size="11">Full conversation forwarded to LLM API,</text>
  <text x="58" y="443" fill="#7F1D1D" font-size="11">including credit cards, medical data, secrets.</text>
  <text x="58" y="463" fill="#DC2626" font-size="18">🔓 No interception layer — data leaks</text>

  <rect x="40" y="490" width="326" height="88" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
  <text x="58" y="512" fill="#991B1B" font-size="13" font-weight="700">Java Ecosystem Gap</text>
  <text x="58" y="532" fill="#7F1D1D" font-size="11">No focused, embeddable conversation state</text>
  <text x="58" y="549" fill="#7F1D1D" font-size="11">manager exists for enterprise Java backends.</text>
  <text x="58" y="565" fill="#DC2626" font-size="18">🧩 Teams reinvent ad-hoc solutions</text>

  <!-- stakeholders -->
  <rect x="40" y="593" width="326" height="98" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="203" y="613" fill="#92400E" font-size="12" font-weight="700" text-anchor="middle">Stakeholders</text>
  <text x="58" y="633" fill="#78350F" font-size="11">🏗 Alex (Architect) · SPI boundaries, decoupling</text>
  <text x="58" y="650" fill="#78350F" font-size="11">🤖 Jordan (AI-Dev) · LLM quality, compression</text>
  <text x="58" y="667" fill="#78350F" font-size="11">🔒 Stan (Security) · PII isolation, zero-fill</text>
  <text x="58" y="684" fill="#78350F" font-size="11">📊 Owen (SRE) · Memory, OOM, latency</text>

  <!-- Arrow col1→col2 -->
  <line x1="382" y1="400" x2="415" y2="400" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="398" y="391" fill="#2563EB" font-size="10" font-weight="700" text-anchor="middle">solves</text>

  <!-- ── COL 2: SOLUTION ── -->
  <rect x="420" y="84" width="358" height="618" rx="12" fill="white" filter="url(#sh)"/>
  <rect x="420" y="84" width="358" height="42" rx="12" fill="#2563EB"/>
  <rect x="420" y="112" width="358" height="14" fill="#2563EB"/>
  <text x="599" y="109" fill="white" font-size="14" font-weight="700" text-anchor="middle">
    ✦  MemoryFunnel Solution
  </text>

  <!-- Funnel -->
  <text x="599" y="152" fill="#1E40AF" font-size="12" font-weight="700" text-anchor="middle">
    3-Layer Intelligent Memory Architecture
  </text>
  <polygon points="434,165 764,165 726,228 472,228" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="599" y="194" fill="#1E40AF" font-size="13" font-weight="700" text-anchor="middle">L1 · Active Buffer (Hot)</text>
  <text x="599" y="212" fill="#1E40AF" font-size="10" text-anchor="middle">Recent messages · Zero-latency writes · Always writable</text>

  <polygon points="472,235 726,235 692,298 508,298" fill="#BFDBFE" stroke="#2563EB" stroke-width="2"/>
  <text x="599" y="263" fill="#1E40AF" font-size="13" font-weight="700" text-anchor="middle">L2 · Condensed Synopsis (Warm)</text>
  <text x="599" y="281" fill="#1E40AF" font-size="10" text-anchor="middle">Semantic compression · Shadow-Buffer result</text>

  <polygon points="508,305 692,305 666,368 534,368" fill="#93C5FD" stroke="#2563EB" stroke-width="2"/>
  <text x="599" y="333" fill="#1E40AF" font-size="13" font-weight="700" text-anchor="middle">L3 · Deep Archive (Cold)</text>
  <text x="599" y="351" fill="#1E40AF" font-size="10" text-anchor="middle">Encrypted · PII-isolated · Optional SPI</text>

  <!-- Capabilities -->
  <rect x="436" y="382" width="326" height="238" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="599" y="402" fill="#1E40AF" font-size="12" font-weight="700" text-anchor="middle">Core Capabilities</text>
  <text x="452" y="422" fill="#1E293B" font-size="11">● Shadow-Buffer — zero-latency concurrent writes</text>
  <text x="452" y="441" fill="#1E293B" font-size="11">● Task-Aware Eviction — forget completed tasks</text>
  <text x="452" y="460" fill="#1E293B" font-size="11">● Delta Patch Merge — no message loss during compress</text>
  <text x="452" y="479" fill="#1E293B" font-size="11">● 8 SPI Extension Points — fully pluggable behaviour</text>
  <text x="452" y="498" fill="#1E293B" font-size="11">● PII Sanitizer — block-all default policy</text>
  <text x="452" y="517" fill="#1E293B" font-size="11">● Multimedia Metadata-First — no binary storage</text>
  <text x="452" y="536" fill="#1E293B" font-size="11">● Session Checkpoint — POJO snapshot restore</text>
  <text x="452" y="555" fill="#1E293B" font-size="11">● Zero external runtime dependencies in core</text>
  <text x="452" y="574" fill="#1E293B" font-size="11">● Java 17 now · Java 21 Virtual Threads ready</text>
  <text x="452" y="593" fill="#1E293B" font-size="11">● Framework-agnostic — pure local Java library</text>

  <!-- Constraints -->
  <rect x="436" y="632" width="326" height="64" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="599" y="652" fill="#065F46" font-size="12" font-weight="700" text-anchor="middle">Design Constraints (Accepted)</text>
  <text x="452" y="671" fill="#047857" font-size="11">✓ Double-buffer memory overhead — space for time</text>
  <text x="452" y="688" fill="#047857" font-size="11">✓ No distributed sync — single-JVM scope (Phase 2)</text>

  <!-- Arrow col2→col3 -->
  <line x1="778" y1="400" x2="811" y2="400" stroke="#7C3AED" stroke-width="2.5" marker-end="url(#arrp)"/>
  <text x="794" y="391" fill="#7C3AED" font-size="10" font-weight="700" text-anchor="middle">built via</text>

  <!-- ── COL 3: HAC-FLOW ── -->
  <rect x="816" y="84" width="360" height="618" rx="12" fill="white" filter="url(#sh)"/>
  <rect x="816" y="84" width="360" height="42" rx="12" fill="#7C3AED"/>
  <rect x="816" y="112" width="360" height="14" fill="#7C3AED"/>
  <text x="996" y="109" fill="white" font-size="14" font-weight="700" text-anchor="middle">
    ⚡  HAC-Flow Methodology
  </text>

  <text x="996" y="151" fill="#5B21B6" font-size="11" text-anchor="middle">Human-Agent Collaboration Flow</text>

  <!-- Stage boxes -->
  <rect x="832" y="162" width="328" height="64" rx="8" fill="#F3E8FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="852" y="184" fill="#5B21B6" font-size="12" font-weight="700">① Intent Probing</text>
  <text x="852" y="203" fill="#6D28D9" font-size="11">Agents scan requirements → Ambiguity_Report.yaml</text>
  <text x="852" y="219" fill="#6D28D9" font-size="10">No assumptions — ambiguity stops progress</text>

  <line x1="996" y1="226" x2="996" y2="240" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrp)"/>

  <rect x="832" y="242" width="328" height="64" rx="8" fill="#F3E8FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="852" y="264" fill="#5B21B6" font-size="12" font-weight="700">② Knowledge Alignment</text>
  <text x="852" y="283" fill="#6D28D9" font-size="11">Multi-role clarification → Frozen_Requirement.yaml</text>
  <text x="852" y="299" fill="#6D28D9" font-size="10">Human confirms scope before any design</text>

  <line x1="996" y1="306" x2="996" y2="320" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrp)"/>

  <rect x="832" y="322" width="328" height="64" rx="8" fill="#F3E8FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="852" y="344" fill="#5B21B6" font-size="12" font-weight="700">③ Parallel Design Debate</text>
  <text x="852" y="363" fill="#6D28D9" font-size="11">Architect vs Security vs SRE → Conflict_Log.json</text>
  <text x="852" y="379" fill="#6D28D9" font-size="10">Conflict is healthy — better decisions emerge</text>

  <line x1="996" y1="386" x2="996" y2="400" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrp)"/>

  <rect x="832" y="402" width="328" height="64" rx="8" fill="#F3E8FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="852" y="424" fill="#5B21B6" font-size="12" font-weight="700">④ Parallel Implementation</text>
  <text x="852" y="443" fill="#6D28D9" font-size="11">Dev Agent (code) + QA Agent (tests) run in parallel</text>
  <text x="852" y="459" fill="#6D28D9" font-size="10">Code and tests produced simultaneously</text>

  <line x1="996" y1="466" x2="996" y2="480" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrp)"/>

  <rect x="832" y="482" width="328" height="64" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
  <text x="852" y="504" fill="#4C1D95" font-size="12" font-weight="700">⑤ Human Arbitration (Final)</text>
  <text x="852" y="523" fill="#5B21B6" font-size="11">Human reviews Conflict_Log → final decisions</text>
  <text x="852" y="539" fill="#5B21B6" font-size="10">Humans own architecture; agents execute</text>

  <!-- Comparison table -->
  <rect x="832" y="560" width="328" height="136" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="996" y="580" fill="#1E293B" font-size="11" font-weight="700" text-anchor="middle">HAC-Flow vs Traditional SDLC</text>

  <line x1="840" y1="588" x2="1152" y2="588" stroke="#E2E8F0"/>
  <text x="848" y="604" fill="#64748B" font-size="10" font-weight="700">Dimension</text>
  <text x="990" y="604" fill="#64748B" font-size="10" font-weight="700">Traditional</text>
  <text x="1090" y="604" fill="#64748B" font-size="10" font-weight="700">HAC-Flow</text>
  <line x1="840" y1="610" x2="1152" y2="610" stroke="#E2E8F0"/>

  <text x="848" y="626" fill="#475569" font-size="10">Security review</text>
  <text x="990" y="626" fill="#DC2626" font-size="10">Post-deploy</text>
  <text x="1090" y="626" fill="#059669" font-size="10">Day 1 ✓</text>

  <text x="848" y="644" fill="#475569" font-size="10">Cost awareness</text>
  <text x="990" y="644" fill="#DC2626" font-size="10">After billing</text>
  <text x="1090" y="644" fill="#059669" font-size="10">Design phase ✓</text>

  <text x="848" y="662" fill="#475569" font-size="10">Conflict resolution</text>
  <text x="990" y="662" fill="#DC2626" font-size="10">Code review</text>
  <text x="1090" y="662" fill="#059669" font-size="10">Design phase ✓</text>

  <text x="848" y="680" fill="#475569" font-size="10">Delivery estimate</text>
  <text x="990" y="680" fill="#DC2626" font-size="10">4–6 weeks</text>
  <text x="1090" y="680" fill="#059669" font-size="10">~25 days ✓</text>
</svg>