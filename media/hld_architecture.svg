<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780"
     font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="da" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="dag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="dao" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D97706"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/></filter>
  </defs>

  <rect width="1200" height="780" fill="#F0F4FF"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="62" fill="#0F172A"/>
  <text x="600" y="32" fill="white" font-size="20" font-weight="700"
        text-anchor="middle" dominant-baseline="middle">
    MemoryFunnel — High Level Design · System Architecture
  </text>
  <text x="600" y="52" fill="#94A3B8" font-size="11" text-anchor="middle" dominant-baseline="middle">
    Shadow-Buffer concurrency · SPI extension framework · Layered component architecture
  </text>

  <!-- ── LEFT PANEL: Component Stack ── -->
  <rect x="20" y="75" width="560" height="680" rx="12" fill="white" filter="url(#sh)"/>
  <text x="300" y="100" fill="#0F172A" font-size="14" font-weight="700" text-anchor="middle">
    Component Architecture Stack
  </text>

  <!-- Your App -->
  <rect x="80" y="112" width="440" height="50" rx="8" fill="#0F172A"/>
  <text x="300" y="141" fill="white" font-size="13" font-weight="700" text-anchor="middle">
    Your Java Application
  </text>
  <line x1="300" y1="162" x2="300" y2="178" stroke="#2563EB" stroke-width="2.5" marker-end="url(#da)"/>

  <!-- Public API -->
  <rect x="60" y="180" width="480" height="58" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="300" y="203" fill="#1E40AF" font-size="13" font-weight="700" text-anchor="middle">
    ConversationManager (Public API)
  </text>
  <text x="300" y="221" fill="#1E40AF" font-size="10" text-anchor="middle">
    addMessage() · getContext() · markTaskComplete() · rollback() · checkpoint()
  </text>
  <line x1="300" y1="238" x2="300" y2="254" stroke="#2563EB" stroke-width="2.5" marker-end="url(#da)"/>

  <!-- Engine -->
  <rect x="60" y="256" width="480" height="52" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="300" y="277" fill="#1E40AF" font-size="12" font-weight="700" text-anchor="middle">
    MemoryFunnelEngine · State Machine Controller
  </text>
  <text x="300" y="295" fill="#3B82F6" font-size="10" text-anchor="middle">
    READY → COMPRESSING → MERGING → PURGING → READY
  </text>
  <line x1="190" y1="308" x2="190" y2="326" stroke="#2563EB" stroke-width="2" marker-end="url(#da)"/>
  <line x1="410" y1="308" x2="410" y2="326" stroke="#D97706" stroke-width="2" marker-end="url(#dao)"/>

  <!-- Dual Buffer -->
  <rect x="60" y="328" width="210" height="98" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="165" y="350" fill="#065F46" font-size="12" font-weight="700" text-anchor="middle">Primary Buffer</text>
  <text x="165" y="368" fill="#047857" font-size="10" text-anchor="middle">AtomicReference&lt;List&gt;</text>
  <text x="165" y="384" fill="#047857" font-size="10" text-anchor="middle">Always writable · Lock-free</text>
  <text x="165" y="400" fill="#047857" font-size="10" text-anchor="middle">StampedLock optimistic read</text>
  <text x="165" y="415" fill="#065F46" font-size="11" font-weight="700" text-anchor="middle">addMessage() → here</text>

  <rect x="300" y="328" width="240" height="98" rx="8" fill="#FFF7ED" stroke="#D97706" stroke-width="1.5"/>
  <text x="420" y="350" fill="#92400E" font-size="12" font-weight="700" text-anchor="middle">Shadow Buffer</text>
  <text x="420" y="368" fill="#B45309" font-size="10" text-anchor="middle">Clone of Primary</text>
  <text x="420" y="384" fill="#B45309" font-size="10" text-anchor="middle">Async compression · Background</text>
  <text x="420" y="400" fill="#B45309" font-size="10" text-anchor="middle">Summarizer SPI called here</text>
  <text x="420" y="415" fill="#92400E" font-size="11" font-weight="700" text-anchor="middle">Never blocks writes</text>

  <!-- Delta Patch -->
  <line x1="165" y1="426" x2="165" y2="444" stroke="#059669" stroke-width="2" marker-end="url(#dag)"/>
  <line x1="420" y1="426" x2="420" y2="444" stroke="#D97706" stroke-width="2" marker-end="url(#dao)"/>

  <rect x="60" y="446" width="480" height="52" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="300" y="467" fill="#1F2937" font-size="12" font-weight="700" text-anchor="middle">
    DeltaPatcher — Atomic Merge
  </text>
  <text x="300" y="483" fill="#4B5563" font-size="10" text-anchor="middle">
    delta = messages with seqId > anchorSeqId · merged = compressed + delta · WriteLock swap
  </text>
  <line x1="300" y1="498" x2="300" y2="514" stroke="#2563EB" stroke-width="2.5" marker-end="url(#da)"/>

  <!-- ContextBroker -->
  <rect x="60" y="516" width="480" height="52" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="300" y="537" fill="#5B21B6" font-size="12" font-weight="700" text-anchor="middle">
    ContextBroker — SPI Orchestrator
  </text>
  <text x="300" y="553" fill="#6D28D9" font-size="10" text-anchor="middle">
    Coordinates Sanitizer → TokenCounter → RetentionPolicy → Metrics on every getContext()
  </text>
  <line x1="300" y1="568" x2="300" y2="584" stroke="#2563EB" stroke-width="2.5" marker-end="url(#da)"/>

  <!-- SPI Layer -->
  <rect x="40" y="586" width="520" height="80" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="300" y="608" fill="#0F172A" font-size="11" font-weight="700" text-anchor="middle">
    SPI Extension Layer — All Pluggable
  </text>
  <text x="70" y="628" fill="#475569" font-size="10">📦 ChatStorage</text>
  <text x="175" y="628" fill="#475569" font-size="10">🔢 TokenCounter</text>
  <text x="300" y="628" fill="#475569" font-size="10">📋 RetentionPolicy</text>
  <text x="428" y="628" fill="#475569" font-size="10">✂️ Summarizer</text>
  <text x="70" y="650" fill="#475569" font-size="10">🔒 Sanitizer</text>
  <text x="175" y="650" fill="#475569" font-size="10">🔐 Encryptor</text>
  <text x="300" y="650" fill="#475569" font-size="10">📊 MetricsProvider</text>
  <text x="428" y="650" fill="#475569" font-size="10">⚙️ ExecutorFactory</text>
  <line x1="300" y1="666" x2="300" y2="682" stroke="#059669" stroke-width="2.5" marker-end="url(#dag)"/>

  <!-- LLM Client -->
  <rect x="80" y="684" width="440" height="50" rx="8" fill="#0F172A"/>
  <text x="300" y="713" fill="#A7F3D0" font-size="13" font-weight="700" text-anchor="middle">
    Your LLM Client (OpenAI, Anthropic, Gemini, local…)
  </text>

  <!-- ── RIGHT PANEL: Shadow-Buffer Detail ── -->
  <rect x="600" y="75" width="580" height="680" rx="12" fill="white" filter="url(#sh)"/>
  <text x="890" y="100" fill="#0F172A" font-size="14" font-weight="700" text-anchor="middle">
    Shadow-Buffer Concurrency Deep Dive
  </text>

  <!-- Step 1 -->
  <rect x="620" y="112" width="540" height="62" rx="8" fill="#F0FDF4" stroke="#059669" stroke-width="1.5"/>
  <text x="640" y="133" fill="#065F46" font-size="11" font-weight="700">① addMessage() — Always Non-Blocking</text>
  <text x="640" y="152" fill="#047857" font-size="10">primaryBuffer.updateAndGet(list → list + msg)</text>
  <text x="640" y="168" fill="#047857" font-size="10">AtomicReference CAS — no lock acquired · returns immediately</text>

  <line x1="890" y1="174" x2="890" y2="190" stroke="#475569" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="900" y="184" fill="#94A3B8" font-size="9">background check</text>

  <!-- Step 2 -->
  <rect x="620" y="192" width="540" height="62" rx="8" fill="#FFF7ED" stroke="#D97706" stroke-width="1.5"/>
  <text x="640" y="213" fill="#92400E" font-size="11" font-weight="700">② Token Threshold Check (Async)</text>
  <text x="640" y="232" fill="#B45309" font-size="10">RetentionPolicy.shouldCompress(tokenCount, maxBudget)?</text>
  <text x="640" y="248" fill="#B45309" font-size="10">If YES → state.compareAndSet(READY → COMPRESSING) · clone primary</text>

  <line x1="890" y1="254" x2="890" y2="270" stroke="#D97706" stroke-width="2" marker-end="url(#dao)"/>

  <!-- Step 3 -->
  <rect x="620" y="272" width="540" height="62" rx="8" fill="#FFF7ED" stroke="#D97706" stroke-width="1.5"/>
  <text x="640" y="293" fill="#92400E" font-size="11" font-weight="700">③ Shadow Compression (Background Thread)</text>
  <text x="640" y="312" fill="#B45309" font-size="10">Summarizer.summarize(shadowCopy) → CompletableFuture&lt;String&gt;</text>
  <text x="640" y="328" fill="#B45309" font-size="10">Primary still fully writable — users see zero latency</text>

  <!-- Concurrent write annotation -->
  <rect x="900" y="285" width="250" height="42" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="910" y="302" fill="#1E40AF" font-size="10" font-weight="700">Meanwhile: New writes to Primary</text>
  <text x="910" y="318" fill="#1E40AF" font-size="10">msg7, msg8, msg9 added by user</text>

  <line x1="890" y1="334" x2="890" y2="350" stroke="#D97706" stroke-width="2" marker-end="url(#dao)"/>

  <!-- Step 4 Delta -->
  <rect x="620" y="352" width="540" height="78" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="640" y="373" fill="#1F2937" font-size="11" font-weight="700">④ Delta Patch Merge (WriteLock — milliseconds only)</text>
  <text x="640" y="392" fill="#4B5563" font-size="10">anchor = lastSeqId at time of shadow clone</text>
  <text x="640" y="408" fill="#4B5563" font-size="10">delta = primary.filter(msg → seqId > anchor)  // {msg7, msg8, msg9}</text>
  <text x="640" y="424" fill="#1F2937" font-size="10" font-weight="700">merged = [synopsis] + delta → primaryBuffer.set(merged)</text>

  <line x1="890" y1="430" x2="890" y2="446" stroke="#059669" stroke-width="2" marker-end="url(#dag)"/>

  <!-- Result -->
  <rect x="620" y="448" width="540" height="52" rx="8" fill="#F0FDF4" stroke="#059669" stroke-width="1.5"/>
  <text x="890" y="470" fill="#065F46" font-size="12" font-weight="700" text-anchor="middle">
    ✓ State Restored: READY
  </text>
  <text x="890" y="488" fill="#047857" font-size="10" text-anchor="middle">
    No messages lost · Primary has synopsis + all delta messages · Token count reduced
  </text>

  <!-- Concurrency guarantee table -->
  <rect x="620" y="514" width="540" height="178" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="890" y="536" fill="#0F172A" font-size="12" font-weight="700" text-anchor="middle">
    Concurrency Guarantee Matrix
  </text>
  <line x1="630" y1="544" x2="1150" y2="544" stroke="#E2E8F0"/>

  <text x="640" y="560" fill="#64748B" font-size="10" font-weight="700">Operation</text>
  <text x="840" y="560" fill="#64748B" font-size="10" font-weight="700">Mechanism</text>
  <text x="1060" y="560" fill="#64748B" font-size="10" font-weight="700">Blocking?</text>
  <line x1="630" y1="566" x2="1150" y2="566" stroke="#E2E8F0"/>

  <text x="640" y="582" fill="#475569" font-size="10">addMessage()</text>
  <text x="840" y="582" fill="#475569" font-size="10">AtomicReference.updateAndGet()</text>
  <text x="1060" y="582" fill="#059669" font-size="10" font-weight="700">❌ Non-blocking</text>

  <text x="640" y="600" fill="#475569" font-size="10">getContext()</text>
  <text x="840" y="600" fill="#475569" font-size="10">StampedLock.tryOptimisticRead()</text>
  <text x="1060" y="600" fill="#059669" font-size="10" font-weight="700">❌ Non-blocking</text>

  <text x="640" y="618" fill="#475569" font-size="10">Shadow compression</text>
  <text x="840" y="618" fill="#475569" font-size="10">ExecutorService (background)</text>
  <text x="1060" y="618" fill="#059669" font-size="10" font-weight="700">❌ Non-blocking</text>

  <text x="640" y="636" fill="#475569" font-size="10">Delta Patch merge</text>
  <text x="840" y="636" fill="#475569" font-size="10">StampedLock.writeLock()</text>
  <text x="1060" y="636" fill="#D97706" font-size="10" font-weight="700">⚡ Brief (ms)</text>

  <text x="640" y="654" fill="#475569" font-size="10">rollback()</text>
  <text x="840" y="654" fill="#475569" font-size="10">StampedLock.writeLock()</text>
  <text x="1060" y="654" fill="#D97706" font-size="10" font-weight="700">⚡ Brief (ms)</text>

  <text x="640" y="672" fill="#475569" font-size="10">checkpoint()</text>
  <text x="840" y="672" fill="#475569" font-size="10">StampedLock.readLock()</text>
  <text x="1060" y="672" fill="#059669" font-size="10" font-weight="700">❌ Shared read</text>

  <text x="640" y="690" fill="#475569" font-size="10">Java 21 migration</text>
  <text x="840" y="690" fill="#475569" font-size="10">ExecutorFactory SPI swap only</text>
  <text x="1060" y="690" fill="#059669" font-size="10" font-weight="700">✓ Zero code change</text>
</svg>